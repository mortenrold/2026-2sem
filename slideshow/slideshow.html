<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <link rel="stylesheet" href="slideshow-style.css">
</head>
<body>
    <div class="slideshow-container">
        <div class="slide">
            <img src="img/cat-1.jpg" alt="">
            <div class="caption">Photo: Christian</div>
        </div>
        <div class="slide">
            <img src="img/cat-2.jpg" alt="">
            <div class="caption">Photo: Merete</div>
        </div>
        <div class="slide">
            <img src="img/cat-3.jpg" alt="">
            <div class="caption">Photo: Jeppe</div>
        </div>
        <a class="prev">&#10094;</a>
        <a class="next">&#10095;</a>
    </div>
</body>
</html>

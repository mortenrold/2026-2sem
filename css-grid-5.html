<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container {
            background: #ccc;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .kasse {
            background: rgb(158, 196, 82);
            padding: 10px;
            color: white;
            font-family: system-ui;
        }
        .two {
            grid-column: 2/5;
        }
        .three {
            grid-column: 1/3;
            grid-row: 2/4;
        }
        .four, .five {
            grid-column: 3/5;
        }
        .six {
            grid-column: span 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kasse">1</div>
        <div class="kasse two">2</div>
        <div class="kasse three">3</div>
        <div class="kasse four">4</div>
        <div class="kasse five">5</div>
        <div class="kasse six">6</div>
    </div>
</body>
</html>
